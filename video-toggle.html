<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.video-switch').forEach(function(switchEl) {
    const panel = switchEl.nextElementSibling;
    if (!panel || !panel.classList.contains('video-panel')) return;
    const buttons = switchEl.querySelectorAll('button');
    const sources = panel.querySelectorAll('.video-source');

    buttons.forEach(function(btn, i) {
      btn.addEventListener('click', function() {
        buttons.forEach(function(b) { b.classList.remove('active'); });
        sources.forEach(function(s) { s.classList.remove('active'); });
        btn.classList.add('active');
        if (sources[i]) sources[i].classList.add('active');
        // Pause any playing videos when switching
        sources.forEach(function(s, j) {
          if (j !== i) {
            var v = s.querySelector('video');
            if (v) v.pause();
            var iframe = s.querySelector('iframe');
            if (iframe) {
              var src = iframe.getAttribute('data-src') || iframe.src;
              iframe.src = '';
              iframe.setAttribute('data-src', src);
            }
          }
        });
        // Restore iframe src for active source
        var activeIframe = sources[i] && sources[i].querySelector('iframe');
        if (activeIframe && !activeIframe.src && activeIframe.getAttribute('data-src')) {
          activeIframe.src = activeIframe.getAttribute('data-src');
        }
      });
    });
  });
});
</script>
